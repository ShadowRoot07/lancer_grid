{% extends 'base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto bg-gray-800 p-8 rounded-lg border border-cyan-900">
    <h1 class="text-2xl font-bold text-cyan-400 mb-6 italic">>> PUBLICAR_NUEVA_MISIÓN</h1>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        {% for field in form %}
            <div>
                <label class="block text-gray-400 text-sm mb-1">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <p class="text-red-500 text-xs">{{ field.errors.0 }}</p>
                {% endif %}
            </div>
        {% endfor %}
        <button type="submit" class="w-full bg-cyan-600 hover:bg-cyan-500 py-3 rounded font-bold mt-4 transition">
            DESPLEGAR CONTRATO
        </button>
    </form>
</div>

<style>
    input, textarea, select { 
        width: 100%; padding: 10px; background: #111827; 
        border: 1px solid #374151; color: white; border-radius: 4px;
    }
    input:focus { border-color: #06b6d4; outline: none; }
</style>
{% endblock %}
